<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../static/script.js"></script>

</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-red-500">Админ-панель</h1>
            <div class="flex gap-4">
                <button onclick="window.location.href='profile.html'" class="text-slate-400 hover:text-white underline">В профиль</button>
                <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded hover:bg-red-700 transition">Выйти</button>
            </div>
        </div>

        <div id="admin-content" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg text-center">
                    <h3 class="text-slate-400 uppercase text-xs font-bold mb-2">Статус сервера</h3>
                    <p id="server-status" class="text-2xl font-mono text-green-400 py-4">ONLINE</p>
                </div>
                
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg text-center">
                    <h3 class="text-slate-400 uppercase text-xs font-bold mb-2">Секретные данные</h3>
                    <p id="admin-data" class="text-lg italic text-slate-300">Загрузка...</p>
                </div>
            </div>

            <div class="mt-8 bg-slate-800 p-6 rounded-xl border border-red-900/30 shadow-lg">
                <h3 class="text-xl font-bold mb-4 text-red-400">Управление пользователями</h3>
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="delete-input" placeholder="Введите ID или Имя пользователя" 
                        class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-500 text-white">
                    <button onclick="deleteUserRequest()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-3 rounded-lg transition">
                        Удалить пользователя
                    </button>
                </div>
                <div class="mt-8 bg-slate-800 p-6 rounded-xl border border-blue-900/30 shadow-lg">
    <h3 class="text-xl font-bold mb-4 text-blue-400">Добавить покупку</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="purchase-item" placeholder="Название товара" 
               class="bg-slate-900 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
        <input type="number" id="purchase-price" placeholder="Цена" 
               class="bg-slate-900 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
    </div>
    <button onclick="addPurchaseRequest()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
        Оформить покупку
    </button>
    <p id="purchase-status" class="mt-4 text-sm hidden"></p>
</div>
                <p id="delete-status" class="mt-4 text-sm hidden"></p>
            </div>
        </div>

        <div id="error-msg" class="bg-red-900/50 border border-red-500 p-8 rounded-xl text-center hidden">
            <h2 class="text-2xl font-bold mb-2">Доступ запрещен! ⛔</h2>
            <p>У вас нет прав администратора для просмотра этой страницы.</p>
        </div>
    </div>


</body>
</html>
